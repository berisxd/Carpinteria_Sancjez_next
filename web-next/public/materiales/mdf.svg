<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F7F7"/>
      <stop offset="50%" stop-color="#EFEFEF"/>
      <stop offset="100%" stop-color="#E4E4E4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="35%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="150" fill="url(#g)"/>
  <!-- subtle horizontal lines (MDF layers) -->
  <line x1="0" y1="50" x2="200" y2="50" stroke="#D5D5D5" stroke-width="0.4" opacity="0.6"/>
  <line x1="0" y1="100" x2="200" y2="100" stroke="#D5D5D5" stroke-width="0.4" opacity="0.6"/>
  <!-- gloss shine -->
  <rect x="20" y="0" width="50" height="150" fill="url(#shine)" opacity="0.4"/>
  <!-- edge line -->
  <rect x="0" y="0" width="200" height="150" fill="none" stroke="#DCDCDC" stroke-width="1"/>
</svg>
