services:
  - type: web
    name: carpinteria-next
    env: node
    plan: free
    rootDir: web-next
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
