databases:
  - name: carpinteria-db
    databaseName: carpinteria_next
    user: carpinteria
    plan: free
    region: oregon

services:
  - type: web
    name: carpinteria-next
    env: node
    plan: free
    region: oregon
    rootDir: web-next
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carpinteria-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false          # Set manually in Render dashboard after first deploy
      - key: NEXTAUTH_SECRET
        generateValue: true  # Render auto-generates a secure random secret
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NODE_VERSION
        value: "20"
